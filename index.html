      /* Main content root needs a stacking context for new background system */
      #root {
        position: relative;
        z-index: 10;
        isolation: isolate; /* Creates new stacking context for children */
        background-color: transparent; /* Allows background to show through */
      }
      /* Standard Scrolling Background System */
      .section-bg-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-size: cover;
        background-position: center;
        filter: blur(2px); /* Subtle 10% blur */
      }
      .section-bg-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.2); /* 20% white fade overlay */
        z-index: 1;
      }
